      tags: squid
    - role: client
      tags: client

- name: "Despliegue de la base de datos MySQL"
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
    - bbdd
    - servicios
  roles:
    - role: mysql
      tags: mysql

- name: "Despliegue de phpMyAdmin"
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
