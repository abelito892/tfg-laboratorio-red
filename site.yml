    - dbadmin
    - servicios
  roles:
    - role: dbadmin
      tags: dbadmin

- name: "Despliegue de servicios de gestión"
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
    - gestion
    - servicios
  roles:
    - role: syslog
      tags: syslog

- name: "Despliegue del panel de control"
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
    - panel
    - servicios
  roles:
    - role: panel
      tags: panel

- name: "Configuración post-despliegue"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: postdeploy
  roles:
    - postdeploy
