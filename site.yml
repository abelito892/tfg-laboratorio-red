      tags: ssh
    - role: dns
      tags: dns
    - role: dhcp
      tags: dhcp

- name: "Despliegue de servicios DMZ"
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
    - servicios_dmz
    - servicios
  roles:
