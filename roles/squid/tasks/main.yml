---
- name: "Construir imagen Docker del proxy Squid"
  community.docker.docker_image:
    name: "tfg/squid"
    tag: "latest"
    build:
      path: "{{ role_path }}/files"
      dockerfile: "Dockerfile"
    source: build
    force_source: false

- name: "Desplegar contenedor squid01"
  community.docker.docker_container:
    name: "{{ contenedores.squid.nombre }}"
    image: "tfg/squid:latest"
    state: started
    restart_policy: unless-stopped
    env:
      TZ: "Europe/Madrid"
    capabilities:
      - NET_ADMIN
    networks:
      - name: "{{ redes.lan.nombre }}"
        ipv4_address: "{{ contenedores.squid.ip }}"

- name: "Conectar squid01 a la red de gestion con IP fija"
  ansible.builtin.shell: |
    docker network disconnect mgmt_net {{ contenedores.squid.nombre }} 2>/dev/null || true
    docker network connect --ip {{ contenedores.squid.ip_mgmt }} mgmt_net {{ contenedores.squid.nombre }}
  register: ip_mgmt_result
  changed_when: true
  failed_when:
    - ip_mgmt_result.rc != 0
    - "'already exists' not in ip_mgmt_result.stderr"

- name: "Anadir ruta hacia DMZ via fw01"
  ansible.builtin.shell: |
    docker exec {{ contenedores.squid.nombre }} \
      ip route replace 172.21.0.0/24 via {{ contenedores.firewall.ip_lan }}
  register: ruta_dmz
  changed_when: ruta_dmz.rc == 0
  failed_when: ruta_dmz.rc != 0 and 'exists' not in ruta_dmz.stderr

- name: "Generar squid.conf desde plantilla"
  ansible.builtin.template:
    src: squid.conf.j2
    dest: "/tmp/squid.conf_{{ contenedores.squid.nombre }}"
    mode: '0644'
  notify: "Recargar Squid"

- name: "Copiar squid.conf al contenedor"
  ansible.builtin.command: >
    docker cp /tmp/squid.conf_{{ contenedores.squid.nombre }}
    {{ contenedores.squid.nombre }}:/etc/squid/squid.conf
  changed_when: true
  notify: "Recargar Squid"

- name: "Verificar configuracion de Squid"
  ansible.builtin.command: >
    docker exec {{ contenedores.squid.nombre }} squid -k parse
  register: check_squid
  changed_when: false

- name: "Verificar que el contenedor squid01 esta activo"
  ansible.builtin.command: >
    docker ps --filter name={{ contenedores.squid.nombre }}
  register: estado_squid
  changed_when: false

- name: "Mostrar estado del contenedor squid01"
  ansible.builtin.debug:
    msg: "{{ estado_squid.stdout_lines }}"
- name: "Reenviar logs de squid01 a syslog01 en tiempo real"
  ansible.builtin.shell: |
    docker exec -d {{ contenedores.squid.nombre }} bash -c       "pgrep -f 'tail.*/var/log/squid/access.log' || tail -F /var/log/squid/access.log | while read line; do logger -n 172.22.0.10 -P 514 --udp 'squid01: $line'; done &"
  changed_when: true
