---
# Rol: dbadmin
# Descripción: Despliega phpMyAdmin como interfaz web para mysql01
# Accesible desde el host en http://localhost:8080

# ─── DESPLIEGUE DEL CONTENEDOR ───────────────────────────────────────────────
# Usamos la imagen oficial de phpMyAdmin - no necesita Dockerfile propio
- name: "Desplegar contenedor dbadmin01 (phpMyAdmin)"
  community.docker.docker_container:
    name: "{{ contenedores.dbadmin.nombre }}"
    image: "phpmyadmin/phpmyadmin:latest"
    state: started
    restart_policy: unless-stopped
    pull: true
    env:
      PMA_HOST: "{{ contenedores.mysql.ip }}"
      PMA_PORT: "3306"
      PMA_USER: "root"
      PMA_PASSWORD: "{{ mysql_root_password }}"
      UPLOAD_LIMIT: "64M"
    ports:
      - "{{ dbadmin_puerto_host }}:{{ dbadmin_puerto_contenedor }}"
    networks:
      - name: "{{ redes.db.nombre }}"

# ─── VERIFICACIÓN ────────────────────────────────────────────────────────────
- name: "Esperar a que phpMyAdmin esté listo (máximo 30s)"
  ansible.builtin.shell: >
    docker exec {{ contenedores.dbadmin.nombre }} bash -c
    "curl -s -o /dev/null -w '%{http_code}' http://localhost:80" 2>/dev/null
  register: pma_check
  retries: 10
  delay: 3
  until: pma_check.stdout == "200"
  changed_when: false
  ignore_errors: true

- name: "Verificar que el contenedor dbadmin01 está activo"
  ansible.builtin.command: >
    docker ps --filter name={{ contenedores.dbadmin.nombre }}
  register: estado_dbadmin
  changed_when: false

- name: "Mostrar estado del contenedor dbadmin01"
  ansible.builtin.debug:
    msg: "{{ estado_dbadmin.stdout_lines }}"
