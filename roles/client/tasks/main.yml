---
# Rol: client
# Descripción: Despliega client01 como cliente de pruebas en la LAN

# ─── CONSTRUCCIÓN DE IMAGEN ──────────────────────────────────────────────────
- name: "Construir imagen Docker del cliente de pruebas"
  community.docker.docker_image:
    name: "tfg/client"
    tag: "latest"
    build:
      path: "{{ role_path }}/files"
      dockerfile: "Dockerfile"
    source: build
    force_source: false

# ─── DESPLIEGUE DEL CONTENEDOR ───────────────────────────────────────────────
- name: "Desplegar contenedor client01 con IP fija"
  community.docker.docker_container:
    name: "{{ contenedores.client.nombre }}"
    image: "tfg/client:latest"
    state: started
    restart_policy: unless-stopped
    capabilities:
      - NET_ADMIN
    networks:
      - name: "{{ redes.lan.nombre }}"
        ipv4_address: "{{ contenedores.client.ip }}"

# ─── CONFIGURACIÓN DE RED ────────────────────────────────────────────────────
- name: "Configurar gateway de client01 hacia fw01"
  ansible.builtin.command: >
    docker exec {{ contenedores.client.nombre }}
    ip route replace default via {{ contenedores.firewall.ip_lan }}
  changed_when: true
  register: ruta_gw
  failed_when: ruta_gw.rc != 0 and 'exists' not in ruta_gw.stderr

# ─── VERIFICACIÓN ────────────────────────────────────────────────────────────
- name: "Verificar que el contenedor client01 está activo"
  ansible.builtin.command: >
    docker ps --filter name={{ contenedores.client.nombre }}
  register: estado_client
  changed_when: false

- name: "Mostrar estado del contenedor client01"
  ansible.builtin.debug:
    msg: "{{ estado_client.stdout_lines }}"
