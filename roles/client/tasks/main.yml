---
- name: "Construir imagen Docker del cliente de pruebas"
  community.docker.docker_image:
    name: "tfg/client"
    tag: "latest"
    build:
      path: "{{ role_path }}/files"
      dockerfile: "Dockerfile"
    source: build
    force_source: false

- name: "Desplegar contenedor client01 sin IP fija"
  community.docker.docker_container:
    name: "{{ contenedores.client.nombre }}"
    image: "tfg/client:latest"
    state: started
    restart_policy: unless-stopped
    env:
      TZ: "Europe/Madrid"
    capabilities:
      - NET_ADMIN
    dns_servers:
      - "192.168.100.20"
    dns_search_domains:
      - "netcorp.local"
      - "laboratorio.local"
    networks:
      - name: "{{ redes.lan.nombre }}"

- name: "Verificar que el contenedor client01 esta activo"
  ansible.builtin.command: >
    docker ps --filter name={{ contenedores.client.nombre }}
  register: estado_client
  changed_when: false

- name: "Mostrar estado del contenedor client01"
  ansible.builtin.debug:
    msg: "{{ estado_client.stdout_lines }}"
- name: "Configurar proxy persistente en client01"
  ansible.builtin.shell: >
    docker exec {{ contenedores.client.nombre }} bash -c
    "echo 'http_proxy=http://192.168.100.40:3128' > /etc/environment &&
    echo 'https_proxy=http://192.168.100.40:3128' >> /etc/environment &&
    echo 'HTTP_PROXY=http://192.168.100.40:3128' >> /etc/environment &&
    echo 'HTTPS_PROXY=http://192.168.100.40:3128' >> /etc/environment &&
    echo 'no_proxy=localhost,127.0.0.1' >> /etc/environment"
  changed_when: true
