---
- name: "Construir imagen Docker de MySQL"
  community.docker.docker_image:
    name: "tfg/mysql"
    tag: "latest"
    build:
      path: "{{ role_path }}/files"
      dockerfile: "Dockerfile"
    source: build
    force_source: false

- name: "Desplegar contenedor mysql01"
  community.docker.docker_container:
    name: "{{ contenedores.mysql.nombre }}"
    image: "tfg/mysql:latest"
    state: started
    restart_policy: unless-stopped
    env:
      MYSQL_ROOT_PASSWORD: "{{ mysql_root_password }}"
      MYSQL_DATABASE: "NetCorp"
      TZ: "Europe/Madrid"
    networks:
      - name: "{{ redes.db.nombre }}"
        ipv4_address: "{{ contenedores.mysql.ip }}"

- name: "Conectar mysql01 a la red de gestion con IP fija"
  ansible.builtin.shell: |
    docker network disconnect mgmt_net {{ contenedores.mysql.nombre }} 2>/dev/null || true
    docker network connect --ip {{ contenedores.mysql.ip_mgmt }} mgmt_net {{ contenedores.mysql.nombre }}
  register: ip_mgmt_result
  changed_when: true
  failed_when:
    - ip_mgmt_result.rc != 0
    - "'already exists' not in ip_mgmt_result.stderr"

- name: "Esperar a que MySQL este completamente inicializado (maximo 90s)"
  ansible.builtin.shell: |
    for i in $(seq 1 45); do
      result=$(docker exec {{ contenedores.mysql.nombre }} bash -c \
        'mysql -uroot -p"{{ mysql_root_password }}" -e "SELECT 1;" 2>&1')
      if echo "$result" | grep -q "^1$"; then
        echo "MySQL listo tras ${i} intentos"
        exit 0
      fi
      sleep 2
    done
    echo "Timeout esperando MySQL"
    exit 1
  register: mysql_ready
  changed_when: false

- name: "Aplicar schema NetCorp si no existe"
  ansible.builtin.shell: |
    existe=$(docker exec {{ contenedores.mysql.nombre }} bash -c \
      'mysql -uroot -p"{{ mysql_root_password }}" -e "SHOW DATABASES LIKE \"NetCorp\";" 2>/dev/null')
    if echo "$existe" | grep -q "NetCorp"; then
      tablas=$(docker exec {{ contenedores.mysql.nombre }} bash -c \
        'mysql -uroot -p"{{ mysql_root_password }}" NetCorp -e "SHOW TABLES;" 2>/dev/null')
      if echo "$tablas" | grep -q "empleados"; then
        echo "Schema ya existe, nada que hacer"
        exit 0
      fi
    fi
    docker exec -i {{ contenedores.mysql.nombre }} bash -c \
      'mysql -uroot -p"{{ mysql_root_password }}"' < {{ role_path }}/files/init.sql
    echo "Schema aplicado"
  register: schema_result
  changed_when: "'Schema aplicado' in schema_result.stdout"

- name: "Verificar empleados cargados"
  ansible.builtin.shell: |
    docker exec {{ contenedores.mysql.nombre }} bash -c \
      'mysql -uroot -p"{{ mysql_root_password }}" NetCorp -e "SELECT COUNT(*) FROM empleados;" 2>/dev/null'
  register: table_check
  changed_when: false
  failed_when: table_check.rc != 0

- name: "Mostrar numero de empleados"
  ansible.builtin.debug:
    msg: "Empleados en NetCorp: {{ table_check.stdout_lines }}"

- name: "Verificar estado del contenedor mysql01"
  ansible.builtin.command: docker ps --filter name={{ contenedores.mysql.nombre }}
  register: estado_mysql
  changed_when: false

- name: "Mostrar estado mysql01"
  ansible.builtin.debug:
    msg: "{{ estado_mysql.stdout_lines }}"
