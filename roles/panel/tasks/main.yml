---
# Rol: panel
# Descripción: Despliega panel01 con Flask + HTMX como panel de control
#              del laboratorio. Accesible en http://localhost:5000

# ─── CONSTRUCCIÓN DE IMAGEN ──────────────────────────────────────────────────
- name: "Construir imagen Docker del panel de control"
  community.docker.docker_image:
    name: "tfg/panel"
    tag: "latest"
    build:
      path: "{{ role_path }}/files"
      dockerfile: "Dockerfile"
    source: build
    force_source: false

# ─── DESPLIEGUE DEL CONTENEDOR ───────────────────────────────────────────────
- name: "Desplegar contenedor panel01"
  community.docker.docker_container:
    name: "{{ contenedores.panel.nombre }}"
    image: "tfg/panel:latest"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ panel_puerto_host }}:{{ panel_puerto_contenedor }}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - "{{ playbook_dir }}:/ansible:ro"
    networks:
      - name: "{{ redes.mgmt.nombre }}"
      - name: "{{ redes.db.nombre }}"

# ─── VERIFICACIÓN ────────────────────────────────────────────────────────────
- name: "Esperar a que el panel esté listo (máximo 30s)"
  ansible.builtin.uri:
    url: "http://localhost:{{ panel_puerto_host }}"
    status_code: 200
  register: panel_check
  retries: 10
  delay: 3
  until: panel_check.status == 200

- name: "Verificar que el contenedor panel01 está activo"
  ansible.builtin.command: >
    docker ps --filter name={{ contenedores.panel.nombre }}
  register: estado_panel
  changed_when: false

- name: "Mostrar estado del contenedor panel01"
  ansible.builtin.debug:
    msg: "{{ estado_panel.stdout_lines }}"
