---
# Inventario del laboratorio de red - TFG ASIR
# Las IPs de los contenedores coinciden con el diseño de la Fase 0

all:
  children:

    # Grupo: el propio host Ubuntu donde corre Docker
    host_docker:
      hosts:
        localhost:
          ansible_connection: local   # No usa SSH, ejecuta comandos localmente
          ansible_python_interpreter: /usr/bin/python3

    # Grupo: contenedor firewall (en la DMZ)
    firewall:
      hosts:
        fw01:
          ansible_host: 192.168.100.1   # IP provisional hasta Fase 3
          ansible_user: root
          ansible_connection: docker    # Ansible se conecta via "docker exec"

    # Grupo: servicios en la LAN
    servicios_lan:
      hosts:
        ssh01:
          ansible_host: 192.168.100.10
          ansible_user: root
          ansible_connection: docker

        dns01:
          ansible_host: 192.168.100.20
          ansible_user: root
          ansible_connection: docker

        dhcp01:
          ansible_host: 192.168.100.30
          ansible_user: root
          ansible_connection: docker
